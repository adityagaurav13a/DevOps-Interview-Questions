name: Github AWS OIDC Deployment

on:
  push:
    branches:
      - github_Action_OIDC
      
permissions:
  id-token: write
  contents: read
  
jobs:
  OIDC-Deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: configure aws credentials using OIDC
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Test AWS CLI access
        run: aws sts get-caller-identity

      # ------------------------
      # 3. Set image tag
      # ------------------------
      - name: Set image tag
        id: meta
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # ------------------------
      # 4. Login to Docker Hub
      # ------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ------------------------
      # 5. Build Docker Image
      # ------------------------
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-app:${IMAGE_TAG} .

      # ------------------------
      # 6. Tag (optional: latest per branch)
      # ------------------------
      - name: Tag image
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/my-app:${IMAGE_TAG} \
          ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest

      # ------------------------
      # 7. Push to Docker Hub
      # ------------------------
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-app:${IMAGE_TAG}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
