# .github/workflows/deploy.yml
# End-to-End CI/CD Pipeline
# Stages: Build → Test → Push → Deploy → Rollback (on failure)

name: Build → Test → Push → Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: judicial-api
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT }}.dkr.ecr.ap-south-1.amazonaws.com
  EKS_CLUSTER_STAGING: judicial-staging
  EKS_CLUSTER_PROD: judicial-prod
  K8S_NAMESPACE: production

jobs:

# ──────────────────────────────────────────────
# STAGE 1 — BUILD
# ──────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      image_full: ${{ steps.tag.outputs.full }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag (short git SHA)
        id: tag
        run: |
          TAG="${GITHUB_SHA::8}"
          FULL="${{ env.ECR_REGISTRY }}/${{ env.APP_NAME }}:${TAG}"
          echo "tag=${TAG}"   >> $GITHUB_OUTPUT
          echo "full=${FULL}" >> $GITHUB_OUTPUT
          echo "📦 Image tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true                          # load into local docker daemon
          tags: ${{ steps.tag.outputs.full }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_COMMIT=${{ steps.tag.outputs.tag }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}


# ──────────────────────────────────────────────
# STAGE 2 — TEST (parallel jobs)
# ──────────────────────────────────────────────
  test-unit:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            --junitxml=junit-unit.xml \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            junit-unit.xml
            coverage.xml

  test-lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install lint tools
        run: pip install flake8 black isort

      - name: Run linters
        run: |
          flake8 src/ --max-line-length=100
          black --check src/
          isort --check-only src/

  test-security:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Scan image with Trivy (CVE check)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image_full }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif

      - name: Dependency vulnerability scan
        run: |
          pip install safety
          safety check -r requirements.txt --json > safety.json || true


# ──────────────────────────────────────────────
# STAGE 3 — PUSH
# (only on main branch after all tests pass)
# ──────────────────────────────────────────────
  push:
    name: 📤 Push to ECR
    runs-on: ubuntu-latest
    needs: [test-unit, test-lint, test-security]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ needs.build.outputs.image_full }}
            ${{ env.ECR_REGISTRY }}/${{ env.APP_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image in ECR
        run: |
          aws ecr describe-images \
            --repository-name ${{ env.APP_NAME }} \
            --image-ids imageTag=${{ needs.build.outputs.image_tag }} \
            --region ${{ env.AWS_REGION }}
          echo "✅ Image confirmed in ECR: ${{ needs.build.outputs.image_tag }}"


# ──────────────────────────────────────────────
# STAGE 4a — DEPLOY TO STAGING
# (auto, no approval)
# ──────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy → Staging
    runs-on: ubuntu-latest
    needs: [push, build]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.judicialsolutions.in
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.STAGING_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig (staging)
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_STAGING }} \
            --region ${{ env.AWS_REGION }}

      - name: Save current image (for rollback reference)
        id: current
        run: |
          CURRENT=$(kubectl get deployment/${{ env.APP_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.spec.template.spec.containers[0].image}' \
            2>/dev/null || echo "none")
          echo "image=${CURRENT}" >> $GITHUB_OUTPUT
          echo "📌 Current image: ${CURRENT}"

      - name: Deploy to staging (rolling update)
        run: |
          kubectl set image deployment/${{ env.APP_NAME }} \
            ${{ env.APP_NAME }}=${{ needs.build.outputs.image_full }} \
            -n ${{ env.K8S_NAMESPACE }}

          echo "⏳ Waiting for rollout..."
          kubectl rollout status deployment/${{ env.APP_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=5m

      - name: Smoke test staging
        id: smoke
        run: |
          echo "⏳ Waiting for ALB to update targets..."
          sleep 20

          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://staging.judicialsolutions.in/health)

            if [ "$STATUS" == "200" ]; then
              echo "✅ Staging healthy — HTTP ${STATUS}"
              exit 0
            fi
            echo "Attempt ${i}/10: HTTP ${STATUS} — retrying in 10s..."
            sleep 10
          done

          echo "❌ Smoke tests failed after 10 attempts"
          exit 1

      # ── ROLLBACK IF SMOKE TEST FAILS ──
      - name: Rollback staging on failure
        if: failure() && steps.smoke.outcome == 'failure'
        run: |
          echo "⚠️ Smoke test failed — rolling back staging..."

          kubectl rollout undo deployment/${{ env.APP_NAME }} \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl rollout status deployment/${{ env.APP_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=3m

          echo "✅ Rollback complete. Staging restored to previous version."


# ──────────────────────────────────────────────
# STAGE 4b — DEPLOY TO PRODUCTION
# (manual approval required via GitHub Environment)
# ──────────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy → Production
    runs-on: ubuntu-latest
    needs: [deploy-staging, build]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production                  # ← requires manual approval in GitHub
      url: https://judicialsolutions.in
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (production)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig (production)
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_PROD }} \
            --region ${{ env.AWS_REGION }}

      - name: Save current image (for rollback)
        id: current
        run: |
          CURRENT=$(kubectl get deployment/${{ env.APP_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "image=${CURRENT}" >> $GITHUB_OUTPUT
          echo "📌 Current production image: ${CURRENT}"

      - name: Deploy to production (zero-downtime rolling update)
        id: deploy
        run: |
          echo "🚀 Deploying ${{ needs.build.outputs.image_tag }} to production..."

          kubectl set image deployment/${{ env.APP_NAME }} \
            ${{ env.APP_NAME }}=${{ needs.build.outputs.image_full }} \
            -n ${{ env.K8S_NAMESPACE }}

          # Wait up to 10 minutes for rollout
          kubectl rollout status deployment/${{ env.APP_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=10m

          echo "✅ Rollout complete"

      - name: Production smoke tests
        id: smoke
        run: |
          echo "⏳ Waiting for ALB health checks..."
          sleep 30

          # Health check
          curl -sf https://api.judicialsolutions.in/health \
            || { echo "❌ Health check failed"; exit 1; }

          # Verify correct version is deployed
          DEPLOYED=$(kubectl get deployment/${{ env.APP_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "Deployed image: ${DEPLOYED}"
          echo "Expected image: ${{ needs.build.outputs.image_full }}"
          [ "${DEPLOYED}" == "${{ needs.build.outputs.image_full }}" ] \
            || { echo "❌ Wrong image deployed"; exit 1; }

          echo "✅ All production smoke tests passed"

      # ── ROLLBACK PRODUCTION ON FAILURE ──
      - name: Rollback production on failure
        if: failure()
        run: |
          echo "🚨 PRODUCTION DEPLOYMENT FAILED — ROLLING BACK"
          echo "Rolling back to: ${{ steps.current.outputs.image }}"

          kubectl rollout undo deployment/${{ env.APP_NAME }} \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl rollout status deployment/${{ env.APP_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=5m

          echo "✅ Production rollback complete"
          echo "🔔 Notifying team..."

      - name: Tag successful release in git
        if: success()
        run: |
          git config user.email "ci@judicialsolutions.in"
          git config user.name "GitHub Actions"
          git tag "release-${{ needs.build.outputs.image_tag }}-$(date +%Y%m%d)"
          git push origin --tags
          echo "🏷️ Release tagged: release-${{ needs.build.outputs.image_tag }}"


# ──────────────────────────────────────────────
# STAGE 5 — NOTIFY (always runs)
# ──────────────────────────────────────────────
  notify:
    name: 📣 Notify
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Notify Slack — success
        if: needs.deploy-production.result == 'success'
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
          -H 'Content-type: application/json' \
          --data '{
            "text": "✅ *${{ env.APP_NAME }}* deployed to production",
            "attachments": [{
              "color": "good",
              "fields": [
                {"title": "Tag",    "value": "${{ needs.build.outputs.image_tag }}", "short": true},
                {"title": "By",     "value": "${{ github.actor }}",                  "short": true},
                {"title": "Branch", "value": "${{ github.ref_name }}",              "short": true},
                {"title": "Run",    "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
              ]
            }]
          }'

      - name: Notify Slack — failure
        if: needs.deploy-production.result == 'failure' || needs.deploy-staging.result == 'failure'
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
          -H 'Content-type: application/json' \
          --data '{
            "text": "❌ *${{ env.APP_NAME }}* deployment FAILED — rollback executed",
            "attachments": [{
              "color": "danger",
              "fields": [
                {"title": "Tag",    "value": "${{ needs.build.outputs.image_tag }}", "short": true},
                {"title": "By",     "value": "${{ github.actor }}",                  "short": true},
                {"title": "Run",    "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
              ]
            }]
          }'